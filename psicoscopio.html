<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Psicoscópio · M&M</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');
  :root{
    --bg:#060608;--border:#1a1a22;
    --accent:#e8d5a3;--muted:#444;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);color:#e8e8e8;font-family:'DM Mono',monospace;overflow:hidden}
  body{display:flex;flex-direction:column}
  #canvas{display:block;width:100%;flex:1;min-height:0}

  .panel{
    background:rgba(6,6,8,.95);border-top:1px solid var(--border);
    padding:10px 12px;display:flex;flex-direction:column;gap:7px;
    flex-shrink:0;max-height:50vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  .row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .title-block{margin-right:auto}
  .eyebrow{font-size:8px;letter-spacing:.28em;color:var(--accent);text-transform:uppercase;opacity:.6}
  .title{font-family:'Playfair Display',serif;font-size:16px;font-weight:400}
  .title em{font-style:italic;color:var(--accent)}

  .btn{background:transparent;border:1px solid var(--border);padding:7px 11px;cursor:pointer;
    font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
  .btn:hover,.btn:active{border-color:var(--accent);color:var(--accent)}
  .btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
  .btn.rec{border-color:#3a1010}
  .btn.rec:hover{border-color:#c0392b;color:#c0392b}
  .btn.recording{border-color:#c0392b;color:#c0392b;animation:blink .8s ease-in-out infinite}

  .slots{display:flex;gap:4px;flex-wrap:wrap}
  .slot{width:42px;height:42px;border:1px dashed #222;cursor:pointer;display:flex;
    align-items:center;justify-content:center;font-size:7px;color:#333;
    text-align:center;line-height:1.4;position:relative;overflow:hidden;
    transition:border-color .15s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
  .slot:active{border-color:#444}
  .slot.loaded{border-color:#2a2a2a;border-style:solid}
  .slot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;pointer-events:none}
  .slot .blabel{position:absolute;bottom:2px;right:2px;font-size:6px;color:var(--accent);opacity:.6;pointer-events:none}
  .slot .remx{position:absolute;top:0;right:2px;font-size:9px;color:#c0392b;display:none;cursor:pointer;z-index:3}
  .slot.loaded:active .remx{display:block}
  .slot input{display:none}

  .sliders{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .sl{display:flex;align-items:center;gap:5px}
  .sl span:first-child{font-size:7px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;width:32px}
  input[type=range]{-webkit-appearance:none;height:2px;background:#1a1a1a;outline:none;cursor:pointer;width:60px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%}
  .sl .val{font-size:7px;color:var(--accent);width:22px}

  .mode-row{display:flex;gap:4px}
  .status{font-size:8px;color:var(--muted);letter-spacing:.07em}
  @keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="panel">
  <div class="row">
    <div class="title-block">
      <div class="eyebrow">MorAIs &amp; Moreira</div>
      <div class="title">Psico<em>scópio</em></div>
    </div>
    <div class="mode-row">
      <button class="btn active" id="btnModeCovers" onclick="setMode('covers')">Covers</button>
      <button class="btn" id="btnModeInk" onclick="setMode('ink')">Ink</button>
    </div>
    <button class="btn" onclick="document.getElementById('audioInput').click()">+ Áudio</button>
    <input type="file" id="audioInput" accept="audio/*,video/*" style="display:none">
    <button class="btn" id="btnPlay" onclick="togglePlay()" disabled>▶ Play</button>
    <button class="btn rec" id="btnRec" onclick="toggleRecord()">⏺ Rec</button>
    <button class="btn" id="btnDown" onclick="downloadVideo()" style="display:none">↓ Baixar</button>
  </div>

  <div class="row" id="slotsRow">
    <div class="slots" id="slots"></div>
  </div>

  <div class="sliders">
    <div class="sl"><span>Blur</span><input type="range" id="slBlur" min="0.02" max="1" step="0.01" value="0.12"><span class="val" id="vBlur">.12</span></div>
    <div class="sl"><span>Motion</span><input type="range" id="slMotion" min="0.1" max="3" step="0.1" value="1"><span class="val" id="vMotion">1.0</span></div>
    <div class="sl"><span>Glow</span><input type="range" id="slGlow" min="0" max="1" step="0.01" value="0.4"><span class="val" id="vGlow">.40</span></div>
    <div class="sl"><span>Scale</span><input type="range" id="slScale" min="0.1" max="1" step="0.01" value="0.38"><span class="val" id="vScale">.38</span></div>
  </div>
  <div class="status" id="status">Carregue imagens e áudio para começar</div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const BANDS = ['Bass','Low','Mid','High'];
const BAND_COLORS = ['#e87070','#70a8e8','#70e898','#e8d5a3'];
const INK_COLORS = [
  [232,112,112],[112,168,232],[112,232,152],[232,213,163],
  [200,100,200],[100,200,180],[230,180,80],[180,80,230]
];

// ── State ──────────────────────────────────────────────────────────────────
let mode = 'covers';
let images = [null,null,null,null];
let imgData = [0,1,2,3].map(i=>({
  angle:0, scale:0.38, x:0, y:0,
  phase: i * Math.PI/2,
  orbitAngle: i * Math.PI/2,
  orbitSpeed: 0.004 + i*0.001,
  behavior: i // 0=orbit, 1=drift, 2=pulse, 3=pendulum
}));

let audioCtx, analyser, source, audioBuffer;
let isPlaying = false;
let mediaRecorder, recordedChunks=[], isRecording=false, recordedBlob=null;
let t = 0;
let pBlur=0.12, pMotion=1, pGlow=0.4, pScale=0.38;

// Ink particles
let inkParticles = [];
let inkTime = 0;

// ── Slots ──────────────────────────────────────────────────────────────────
const slotsEl = document.getElementById('slots');
for(let i=0;i<4;i++){
  const slot = document.createElement('div');
  slot.className='slot'; slot.id=`slot${i}`;
  slot.innerHTML=`<input type="file" accept="image/*"><span class="remx" id="rem${i}">✕</span><span class="blabel">${BANDS[i]}</span><span style="font-size:7px;color:#2a2a2a">IMG<br>${i+1}</span>`;
  slot.querySelector('input').addEventListener('change',e=>loadImg(i,e));
  slot.querySelector(`#rem${i}`).addEventListener('click',e=>{e.stopPropagation();clearSlot(i);});
  slot.addEventListener('click',()=>slot.querySelector('input').click());
  slotsEl.appendChild(slot);
}

async function loadImg(idx,e){
  const file=e.target.files[0]; if(!file) return;
  images[idx]=await createImageBitmap(file);
  const slot=document.getElementById(`slot${idx}`);
  slot.classList.add('loaded');
  let img=slot.querySelector('img');
  if(!img){img=document.createElement('img');slot.appendChild(img);}
  img.src=URL.createObjectURL(file);
  // Spread initial orbit positions
  imgData[idx].orbitAngle = idx * Math.PI/2 + Math.random()*0.3;
  setStatus(`Slot ${idx+1} · ${BANDS[idx]}`);
}

function clearSlot(idx){
  images[idx]=null;
  const slot=document.getElementById(`slot${idx}`);
  slot.classList.remove('loaded');
  const img=slot.querySelector('img'); if(img) img.remove();
}

// ── Audio ──────────────────────────────────────────────────────────────────
document.getElementById('audioInput').addEventListener('change',async e=>{
  const file=e.target.files[0]; if(!file) return;
  setStatus('Carregando...');
  if(!audioCtx) initAudio();
  try{
    audioBuffer=await audioCtx.decodeAudioData(await file.arrayBuffer());
    document.getElementById('btnPlay').disabled=false;
    setStatus(`Áudio · ${audioBuffer.duration.toFixed(1)}s`);
  }catch(err){ setStatus('Erro. Tente .mp3 ou .m4a'); }
});

function initAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=2048; analyser.smoothingTimeConstant=0.8;
  analyser.connect(audioCtx.destination);
}

function togglePlay(){
  if(!audioBuffer) return;
  if(isPlaying) stopAudio(); else playAudio();
}

function playAudio(){
  if(!audioCtx||!audioBuffer) return;
  if(audioCtx.state==='suspended') audioCtx.resume();
  if(source){try{source.stop()}catch(e){}}
  source=audioCtx.createBufferSource();
  source.buffer=audioBuffer; source.connect(analyser);
  source.start(0);
  source.onended=()=>{isPlaying=false;document.getElementById('btnPlay').textContent='▶ Play';};
  isPlaying=true; document.getElementById('btnPlay').textContent='❚❚ Pausa';
}

function stopAudio(){
  if(source){try{source.stop()}catch(e){} source=null;}
  isPlaying=false; document.getElementById('btnPlay').textContent='▶ Play';
}

function getBands(){
  if(!analyser) return [0,0,0,0];
  const data=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const binHz=audioCtx.sampleRate/analyser.fftSize;
  return [[20,250],[250,800],[800,4000],[4000,20000]].map(([lo,hi])=>{
    const s=Math.floor(lo/binHz),e=Math.min(Math.ceil(hi/binHz),data.length);
    let sum=0; for(let i=s;i<e;i++) sum+=data[i];
    return sum/((e-s)*255);
  });
}

// ── Canvas ─────────────────────────────────────────────────────────────────
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=canvas.offsetWidth*window.devicePixelRatio;
  canvas.height=canvas.offsetHeight*window.devicePixelRatio;
}
window.addEventListener('resize',resize); resize();

// ── Draw loop ──────────────────────────────────────────────────────────────
function draw(){
  requestAnimationFrame(draw);
  t+=0.016;
  const W=canvas.width, H=canvas.height;
  const bands=getBands();

  if(mode==='covers') drawCovers(W,H,bands);
  else drawInk(W,H,bands);
}
draw();

// ── COVERS MODE ────────────────────────────────────────────────────────────
function drawCovers(W,H,bands){
  ctx.fillStyle=`rgba(6,6,8,${pBlur})`;
  ctx.fillRect(0,0,W,H);

  const hasAny=images.some(Boolean);
  if(!hasAny){
    drawIdleBars(W,H,bands); return;
  }

  // Sort by scale for depth (smaller = further back, draw first)
  const order=[0,1,2,3].filter(i=>images[i]);
  order.sort((a,b)=>imgData[a].scale-imgData[b].scale);

  order.forEach(i=>{
    const img=images[i]; if(!img) return;
    const band=bands[i]||0;
    const d=imgData[i];
    const m=pMotion;

    // Different movement per slot
    switch(d.behavior){
      case 0: // Orbit around center
        d.orbitAngle += (d.orbitSpeed + band*0.04)*m;
        const orbitR = Math.min(W,H)*0.22*m;
        d.x = W/2 + Math.cos(d.orbitAngle)*orbitR;
        d.y = H/2 + Math.sin(d.orbitAngle)*orbitR*0.55;
        d.angle += (0.005+band*0.06)*m;
        break;
      case 1: // Drift + slow rotate
        d.x = W/2 + Math.sin(t*0.25+d.phase)*W*0.28*m;
        d.y = H/2 + Math.cos(t*0.18+d.phase)*H*0.22*m;
        d.angle += (0.003+band*0.05)*m*-1;
        break;
      case 2: // Scale pulse + float
        d.x = W/2 + Math.cos(t*0.2+d.phase)*W*0.18*m;
        d.y = H/2 + Math.sin(t*0.3+d.phase)*H*0.28*m;
        d.angle += 0.002*m;
        break;
      case 3: // Pendulum
        d.x = W/2 + Math.sin(t*0.4+d.phase)*W*0.32*m;
        d.y = H*0.45 + Math.cos(t*0.4+d.phase)*H*0.12*m;
        d.angle = Math.sin(t*0.4+d.phase)*0.3*m;
        break;
    }

    // Scale — each image has its own base size + band response
    const baseSize = pScale * Math.min(W,H) * (0.55 + i*0.08);
    d.scale = baseSize + band*0.15*Math.min(W,H)*m;

    // 3D perspective illusion — skew based on orbit angle
    const perspX = mode==='covers' && d.behavior===0
      ? Math.cos(d.orbitAngle)*0.35 : 0;
    const perspY = mode==='covers' && d.behavior===0
      ? Math.sin(d.orbitAngle)*0.15 : 0;

    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(d.angle);

    // Apply perspective transform for depth feel
    if(d.behavior===0){
      const depthScale = 0.7 + Math.sin(d.orbitAngle)*0.3;
      ctx.scale(1, depthScale);
    }

    if(pGlow>0&&band>0.04){
      ctx.shadowColor=BAND_COLORS[i];
      ctx.shadowBlur=band*50*pGlow;
    }
    ctx.globalAlpha=0.35+band*0.65;
    ctx.drawImage(img,-d.scale/2,-d.scale/2,d.scale,d.scale);
    ctx.restore();
  });

  // Center ring
  const avg=bands.reduce((a,b)=>a+b,0)/4;
  if(avg>0.02){
    ctx.beginPath();
    ctx.arc(W/2,H/2,Math.min(W,H)*(0.28+avg*0.12),0,Math.PI*2);
    ctx.strokeStyle=`rgba(232,213,163,${avg*0.1})`;
    ctx.lineWidth=1; ctx.stroke();
  }
}

function drawIdleBars(W,H,bands){
  const bw=W/4;
  bands.forEach((b,i)=>{
    ctx.fillStyle=BAND_COLORS[i]+'2a';
    ctx.fillRect(i*bw+2,H-b*H*0.5,bw-4,b*H*0.5);
  });
  ctx.fillStyle='rgba(232,213,163,.1)';
  ctx.font=`${10*window.devicePixelRatio}px DM Mono`;
  ctx.textAlign='center';
  ctx.fillText('Carregue imagens para visualizar',W/2,H/2);
}

// ── INK MODE ───────────────────────────────────────────────────────────────
function drawInk(W,H,bands){
  // Very slow fade for ink trail
  ctx.fillStyle='rgba(4,4,6,0.008)';
  ctx.fillRect(0,0,W,H);

  inkTime+=0.016;
  const avg=bands.reduce((a,b)=>a+b,0)/4;
  const bass=bands[0]||0;
  const mid=bands[2]||0;
  const high=bands[3]||0;

  // Spawn particles from music
  if(avg>0.03){
    const count=Math.floor(avg*8*pMotion)+1;
    for(let n=0;n<count;n++){
      const colorIdx=Math.floor(Math.random()*INK_COLORS.length);
      const angle=Math.random()*Math.PI*2;
      const dist=Math.random()*Math.min(W,H)*0.35*pMotion;
      inkParticles.push({
        x: W/2 + Math.cos(angle)*dist,
        y: H/2 + Math.sin(angle)*dist,
        vx: (Math.random()-.5)*2*(1+bass*4)*pMotion,
        vy: (Math.random()-.5)*2*(1+bass*4)*pMotion,
        r: (2+Math.random()*20*(avg+bass))*pMotion,
        color: INK_COLORS[colorIdx],
        alpha: 0.6+Math.random()*0.4,
        life: 1,
        decay: 0.003+Math.random()*0.008+high*0.02,
        spread: 1+mid*3
      });
    }
  }

  // Update + draw particles
  inkParticles = inkParticles.filter(p=>{
    p.life-=p.decay;
    if(p.life<=0) return false;
    p.x+=p.vx*p.spread;
    p.y+=p.vy*p.spread;
    p.vx*=0.97; p.vy*=0.97;
    p.r*=1.003;

    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    const [r,g2,b]=p.color;
    g.addColorStop(0,`rgba(${r},${g2},${b},${p.alpha*p.life*0.8})`);
    g.addColorStop(0.4,`rgba(${r},${g2},${b},${p.alpha*p.life*0.3})`);
    g.addColorStop(1,`rgba(${r},${g2},${b},0)`);
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=g;
    ctx.fill();
    return true;
  });

  // Cap particles
  if(inkParticles.length>600) inkParticles.splice(0,inkParticles.length-600);
}

// Touch/click for ink mode
canvas.addEventListener('click',e=>{
  if(mode!=='ink') return;
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)*window.devicePixelRatio;
  const y=(e.clientY-rect.top)*window.devicePixelRatio;
  spawnInkDrop(x,y,0.5);
});
canvas.addEventListener('touchmove',e=>{
  if(mode!=='ink') return;
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  Array.from(e.touches).forEach(touch=>{
    const x=(touch.clientX-rect.left)*window.devicePixelRatio;
    const y=(touch.clientY-rect.top)*window.devicePixelRatio;
    spawnInkDrop(x,y,0.3);
  });
},{passive:false});

function spawnInkDrop(x,y,intensity){
  const colorIdx=Math.floor(Math.random()*INK_COLORS.length);
  for(let i=0;i<8;i++){
    const angle=Math.random()*Math.PI*2;
    const [r,g,b]=INK_COLORS[colorIdx];
    inkParticles.push({
      x,y,
      vx:Math.cos(angle)*(1+Math.random()*3)*pMotion,
      vy:Math.sin(angle)*(1+Math.random()*3)*pMotion,
      r:5+Math.random()*25*intensity*pMotion,
      color:[r,g,b],
      alpha:0.7+Math.random()*0.3,
      life:1,
      decay:0.004+Math.random()*0.006,
      spread:1.5
    });
  }
}

// ── Mode switch ────────────────────────────────────────────────────────────
function setMode(m){
  mode=m;
  document.getElementById('btnModeCovers').classList.toggle('active',m==='covers');
  document.getElementById('btnModeInk').classList.toggle('active',m==='ink');
  document.getElementById('slotsRow').style.display=m==='covers'?'flex':'none';
  // Clear canvas on switch
  ctx.fillStyle='#060608';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  inkParticles=[];
}

// ── Recording ──────────────────────────────────────────────────────────────
function toggleRecord(){ if(isRecording) stopRecord(); else startRecord(); }

function startRecord(){
  recordedChunks=[]; recordedBlob=null;
  document.getElementById('btnDown').style.display='none';
  const stream=canvas.captureStream(30);
  if(audioCtx&&analyser){
    try{
      const dest=audioCtx.createMediaStreamDestination();
      analyser.connect(dest);
      dest.stream.getAudioTracks().forEach(t=>stream.addTrack(t));
    }catch(e){}
  }
  const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
    ?'video/webm;codecs=vp9'
    :MediaRecorder.isTypeSupported('video/webm')?'video/webm':'video/mp4';
  try{
    mediaRecorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:5000000});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data);};
    mediaRecorder.onstop=()=>{
      recordedBlob=new Blob(recordedChunks,{type:mime});
      document.getElementById('btnDown').style.display='block';
      setStatus(`Pronto · ${(recordedBlob.size/1024/1024).toFixed(1)}MB`);
    };
    mediaRecorder.start(100); isRecording=true;
    document.getElementById('btnRec').className='btn recording';
    document.getElementById('btnRec').textContent='⏹ Parar';
    setStatus('Gravando...');
    if(!isPlaying&&audioBuffer) playAudio();
  }catch(e){ setStatus('Gravação não suportada. Use Chrome desktop.'); }
}

function stopRecord(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive') mediaRecorder.stop();
  isRecording=false;
  document.getElementById('btnRec').className='btn rec';
  document.getElementById('btnRec').textContent='⏺ Rec';
}

function downloadVideo(){
  if(!recordedBlob) return;
  const url=URL.createObjectURL(recordedBlob);
  const a=document.createElement('a');
  a.href=url; a.download=`psicoscopio-${Date.now()}.webm`;
  a.click(); URL.revokeObjectURL(url);
}

// ── Sliders ────────────────────────────────────────────────────────────────
[['slBlur','vBlur',2,v=>pBlur=v],
 ['slMotion','vMotion',1,v=>pMotion=v],
 ['slGlow','vGlow',2,v=>pGlow=v],
 ['slScale','vScale',2,v=>pScale=v]
].forEach(([id,vid,dec,fn])=>{
  document.getElementById(id).addEventListener('input',function(){
    const v=parseFloat(this.value);
    document.getElementById(vid).textContent=v.toFixed(dec);
    fn(v);
  });
});

function setStatus(msg){document.getElementById('status').textContent=msg;}
</script>
</body>
</html>
