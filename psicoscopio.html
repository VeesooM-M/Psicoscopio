<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Psicoscópio · M&M</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');
  :root{--bg:#060608;--border:#1a1a22;--accent:#e8d5a3;--muted:#444;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);color:#e8e8e8;font-family:'DM Mono',monospace;overflow:hidden}
  body{display:flex;flex-direction:column}
  #canvas{display:block;width:100%;flex:1;min-height:0;touch-action:none}
  .panel{background:rgba(6,6,8,.95);border-top:1px solid var(--border);padding:10px 12px;display:flex;flex-direction:column;gap:7px;flex-shrink:0;max-height:52vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .title-block{margin-right:auto}
  .eyebrow{font-size:8px;letter-spacing:.28em;color:var(--accent);text-transform:uppercase;opacity:.6}
  .title{font-family:'Playfair Display',serif;font-size:16px;font-weight:400}
  .title em{font-style:italic;color:var(--accent)}
  .btn{background:transparent;border:1px solid var(--border);padding:6px 10px;cursor:pointer;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
  .btn:hover,.btn:active{border-color:var(--accent);color:var(--accent)}
  .btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
  .btn.rec{border-color:#3a1010}
  .btn.rec:hover,.btn.rec:active{border-color:#c0392b;color:#c0392b}
  .btn.recording{border-color:#c0392b;color:#c0392b;animation:blink .8s ease-in-out infinite}
  .slots{display:flex;gap:4px;flex-wrap:wrap}
  .slot{width:40px;height:40px;border:1px dashed #222;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:7px;color:#333;text-align:center;line-height:1.4;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;flex-shrink:0}
  .slot.loaded{border-color:#2a2a2a;border-style:solid}
  .slot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;pointer-events:none}
  .slot .blabel{position:absolute;bottom:2px;right:2px;font-size:6px;color:var(--accent);opacity:.6;pointer-events:none}
  .slot .remx{position:absolute;top:0;right:2px;font-size:9px;color:#c0392b;display:none;cursor:pointer;z-index:3}
  .slot.loaded:active .remx{display:block}
  .slot input{display:none}
  .sliders{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
  .sl{display:flex;align-items:center;gap:4px}
  .sl span:first-child{font-size:7px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;width:38px}
  input[type=range]{-webkit-appearance:none;height:2px;background:#1a1a1a;outline:none;cursor:pointer;width:58px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%}
  .sl .val{font-size:7px;color:var(--accent);width:28px}
  .mode-row{display:flex;gap:3px}
  .swatches{display:flex;gap:3px;align-items:center}
  .swatch{width:18px;height:18px;border:1px solid #333;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
  .swatch.selected{border-color:var(--accent);border-width:2px}
  .ctrl-section{display:none;flex-direction:column;gap:7px}
  .ctrl-section.visible{display:flex}
  .pslot{width:50px;height:50px;border:1px dashed #222;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:7px;color:#333;text-align:center;line-height:1.4;position:relative;overflow:hidden;flex-shrink:0}
  .pslot.loaded{border-color:#2a2a2a;border-style:solid}
  .pslot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;pointer-events:none}
  .pslot input{display:none}
  .shape-btns{display:flex;gap:3px;flex-wrap:wrap}
  .status{font-size:8px;color:var(--muted);letter-spacing:.07em}
  @keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="panel">
  <div class="row">
    <div class="title-block">
      <div class="eyebrow">MorAIs &amp; Moreira</div>
      <div class="title">Psico<em>scópio</em></div>
    </div>
    <div class="mode-row">
      <button class="btn active" id="btnModeCovers" onclick="setMode('covers')">Covers</button>
      <button class="btn" id="btnModeInk" onclick="setMode('ink')">Ink</button>
      <button class="btn" id="btnModeShapes" onclick="setMode('shapes')">Shapes</button>
      <button class="btn" id="btnModePuzzle" onclick="setMode('puzzle')">Puzzle</button>
    </div>
    <button class="btn" onclick="document.getElementById('audioInput').click()">+ Áudio</button>
    <input type="file" id="audioInput" accept="audio/*,video/*" style="display:none">
    <button class="btn" id="btnPlay" onclick="togglePlay()" disabled>▶ Play</button>
    <button class="btn rec" id="btnRec" onclick="toggleRecord()">⏺ Rec</button>
    <button class="btn" id="btnDown" onclick="downloadVideo()" style="display:none">↓ Baixar</button>
  </div>

  <!-- COVERS -->
  <div class="ctrl-section visible" id="ctrlCovers">
    <div class="row"><div class="slots" id="slots"></div></div>
    <div class="sliders">
      <div class="sl"><span>Blur</span><input type="range" id="slBlur" min="0.02" max="1" step="0.01" value="0.12"><span class="val" id="vBlur">.12</span></div>
      <div class="sl"><span>Motion</span><input type="range" id="slMotion" min="0.1" max="3" step="0.1" value="1"><span class="val" id="vMotion">1.0</span></div>
      <div class="sl"><span>Glow</span><input type="range" id="slGlow" min="0" max="1" step="0.01" value="0.4"><span class="val" id="vGlow">.40</span></div>
      <div class="sl"><span>Scale</span><input type="range" id="slScale" min="0.1" max="1" step="0.01" value="0.38"><span class="val" id="vScale">.38</span></div>
      <div class="sl"><span>LFO Hz</span><input type="range" id="slCovLFO" min="0" max="2" step="0.01" value="0"><span class="val" id="vCovLFO">off</span></div>
    </div>
  </div>

  <!-- INK -->
  <div class="ctrl-section" id="ctrlInk">
    <div class="sliders">
      <div class="sl"><span>Fade</span><input type="range" id="slInkBlur" min="0.005" max="0.08" step="0.001" value="0.025"><span class="val" id="vInkBlur">.025</span></div>
      <div class="sl"><span>Motion</span><input type="range" id="slInkMotion" min="0.1" max="3" step="0.1" value="1"><span class="val" id="vInkMotion">1.0</span></div>
      <div class="sl"><span>Density</span><input type="range" id="slInkDensity" min="1" max="14" step="1" value="6"><span class="val" id="vInkDensity">6</span></div>
      <div class="sl"><span>LFO Hz</span><input type="range" id="slInkLFO" min="0" max="2" step="0.01" value="0"><span class="val" id="vInkLFO">off</span></div>
    </div>
    <div class="row">
      <button class="btn" id="btnDraw" onclick="toggleDraw()">✏️ Desenho</button>
      <div class="swatches" id="swatches"></div>
    </div>
    <div class="sliders">
      <div class="sl"><span>Espess.</span><input type="range" id="slDW" min="2" max="30" step="1" value="8"><span class="val" id="vDW">8px</span></div>
      <div class="sl"><span>Duração</span><input type="range" id="slDD" min="1" max="30" step="0.5" value="6"><span class="val" id="vDD">6s</span></div>
    </div>
  </div>

  <!-- SHAPES -->
  <div class="ctrl-section" id="ctrlShapes">
    <div class="shape-btns">
      <button class="btn active" id="shpWave" onclick="setShape('wave')">Onda</button>
      <button class="btn" id="shpSpiral" onclick="setShape('spiral')">Espiral</button>
      <button class="btn" id="shpLightning" onclick="setShape('lightning')">Raio</button>
      <button class="btn" id="shpMandala" onclick="setShape('mandala')">Mandala</button>
      <button class="btn" id="shpTribal" onclick="setShape('tribal')">Tribal</button>
    </div>
    <div class="sliders">
      <div class="sl"><span>Fade</span><input type="range" id="slShpBlur" min="0.01" max="0.15" step="0.005" value="0.04"><span class="val" id="vShpBlur">.040</span></div>
      <div class="sl"><span>Intensity</span><input type="range" id="slShpInt" min="0.1" max="3" step="0.1" value="1"><span class="val" id="vShpInt">1.0</span></div>
      <div class="sl"><span>Rough</span><input type="range" id="slShpRough" min="0" max="1" step="0.05" value="0.4"><span class="val" id="vShpRough">.40</span></div>
      <div class="sl"><span>LFO Hz</span><input type="range" id="slShpLFO" min="0" max="2" step="0.01" value="0.2"><span class="val" id="vShpLFO">.20</span></div>
    </div>
  </div>

  <!-- PUZZLE -->
  <div class="ctrl-section" id="ctrlPuzzle">
    <div class="row">
      <div class="pslot" id="pslot" onclick="document.getElementById('pImgIn').click()">
        <input type="file" id="pImgIn" accept="image/*" style="display:none">
        <span>+ Img</span>
      </div>
      <div style="font-size:8px;color:var(--muted);line-height:1.8;margin-left:6px">Puzzle revela<br>ao ritmo da música</div>
    </div>
    <div class="sliders">
      <div class="sl"><span>Peças</span><input type="range" id="slPieces" min="20" max="120" step="4" value="70"><span class="val" id="vPieces">70</span></div>
    </div>
    <div class="row">
      <button class="btn" onclick="resetPuzzle()">↺ Reset</button>
      <div class="status" id="pProgress"></div>
    </div>
  </div>

  <div class="status" id="status">Escolha um modo e carregue áudio</div>
</div>

<script>
// ── Constants ───────────────────────────────────────────────────────────────
const BANDS=['Bass','Low','Mid','High'];
const BAND_COLORS=['#e87070','#70a8e8','#70e898','#e8d5a3'];
const INK_COLORS_AMB=[[200,170,180],[160,190,200],[180,200,170],[220,200,160],[180,170,200],[200,185,160],[165,185,195],[205,185,185]];
const DRAW_COLORS=['#ffffff','#ff3333','#ffcc00','#33ff66','#33ccff','#cc44ff','#ff8800','#000000'];
const SHAPE_PALETTES={
  wave:['#e8d5a3','#c4a882','#a08060'],
  spiral:['#a0c0e0','#6080a0','#e8d5a3'],
  lightning:['#ffffff','#e8d5a3','#c0d0ff'],
  mandala:['#e87070','#e8d5a3','#70a8e8','#70e898'],
  tribal:['#e8a060','#c07040','#e8d5a3']
};

// ── State ────────────────────────────────────────────────────────────────────
let mode='covers', shapeType='wave';
let audioCtx,analyser,source,audioBuffer;
let isPlaying=false;
let t=0;

// LFO
let lfoCovers=0,lfoInk=0,lfoShapes=0.2;
let lfoPhase=0;

// Covers
let images=[null,null,null,null];
let imgData=[0,1,2,3].map(i=>({angle:0,scale:0.38,x:0,y:0,phase:i*Math.PI/2,orbitAngle:i*Math.PI/2,orbitSpeed:0.004+i*0.001,behavior:i}));
let pBlur=0.12,pMotion=1,pGlow=0.4,pScale=0.38;

// Ink
let inkParticles=[];
let pInkBlur=0.025,pInkMotion=1,pInkDensity=6;
let drawMode=false,drawStrokes=[],drawColor=[255,255,255],drawWidth=8,drawDuration=6;
let isPointerDown=false,lastDrawPos=null;

// Shapes
let pShpBlur=0.04,pShpInt=1,pShpRough=0.4;
let shapeAngle=0,spiralArms=[];
let tribalGlyphs=[];

// Puzzle
let puzzleImage=null,puzzlePieces=[],puzzleRevealed=0,puzzleInterval=0;
let puzzleStartTime=0,puzzleRunning=false,puzzleCompletionFade=0;
let puzzlePieceCount=70,puzzleCanvas=document.createElement('canvas');
let puzzleCols=0,puzzleRows=0;

// Recording
let mediaRecorder,recordedChunks=[],isRecording=false,recordedBlob=null;

// ── Build UI ─────────────────────────────────────────────────────────────────
// Cover slots
const slotsEl=document.getElementById('slots');
for(let i=0;i<4;i++){
  const slot=document.createElement('div');
  slot.className='slot';slot.id=`slot${i}`;
  slot.innerHTML=`<input type="file" accept="image/*"><span class="remx" id="rem${i}">✕</span><span class="blabel">${BANDS[i]}</span><span style="font-size:7px;color:#2a2a2a">IMG<br>${i+1}</span>`;
  slot.querySelector('input').addEventListener('change',e=>loadCoverImg(i,e));
  slot.querySelector(`#rem${i}`).addEventListener('click',e=>{e.stopPropagation();clearSlot(i);});
  slot.addEventListener('click',()=>slot.querySelector('input').click());
  slotsEl.appendChild(slot);
}

// Draw swatches
const swatchesEl=document.getElementById('swatches');
DRAW_COLORS.forEach((c,i)=>{
  const sw=document.createElement('div');
  sw.className='swatch'+(i===0?' selected':'');
  sw.style.background=c;
  if(c==='#000000') sw.style.border='1px solid #555';
  sw.addEventListener('click',()=>{
    const rgb=hexToRgb(c);drawColor=rgb;
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('selected'));
    sw.classList.add('selected');
  });
  swatchesEl.appendChild(sw);
});

function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b];}

// Puzzle image slot
document.getElementById('pImgIn').addEventListener('change',async e=>{
  const file=e.target.files[0];if(!file)return;
  puzzleImage=await createImageBitmap(file);
  const slot=document.getElementById('pslot');
  slot.classList.add('loaded');
  let img=slot.querySelector('img');
  if(!img){img=document.createElement('img');slot.appendChild(img);}
  img.src=URL.createObjectURL(file);
  setStatus('Imagem do puzzle carregada');
  resetPuzzle();
});

// ── Image loaders ─────────────────────────────────────────────────────────────
async function loadCoverImg(idx,e){
  const file=e.target.files[0];if(!file)return;
  images[idx]=await createImageBitmap(file);
  const slot=document.getElementById(`slot${idx}`);
  slot.classList.add('loaded');
  let img=slot.querySelector('img');
  if(!img){img=document.createElement('img');slot.appendChild(img);}
  img.src=URL.createObjectURL(file);
  imgData[idx].orbitAngle=idx*Math.PI/2+Math.random()*0.3;
  setStatus(`Slot ${idx+1} carregado`);
}
function clearSlot(idx){
  images[idx]=null;
  const slot=document.getElementById(`slot${idx}`);
  slot.classList.remove('loaded');
  const img=slot.querySelector('img');if(img)img.remove();
}

// ── Audio ─────────────────────────────────────────────────────────────────────
document.getElementById('audioInput').addEventListener('change',async e=>{
  const file=e.target.files[0];if(!file)return;
  setStatus('Carregando áudio...');
  if(!audioCtx)initAudio();
  try{
    audioBuffer=await audioCtx.decodeAudioData(await file.arrayBuffer());
    document.getElementById('btnPlay').disabled=false;
    setStatus(`Áudio · ${audioBuffer.duration.toFixed(1)}s`);
    if(mode==='puzzle')resetPuzzle();
  }catch(err){setStatus('Erro. Tente .mp3 ou .m4a');}
});

function initAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=2048;analyser.smoothingTimeConstant=0.8;
  analyser.connect(audioCtx.destination);
}

function togglePlay(){
  if(!audioBuffer)return;
  if(isPlaying)stopAudio();else playAudio();
}

function playAudio(){
  if(!audioCtx||!audioBuffer)return;
  if(audioCtx.state==='suspended')audioCtx.resume();
  if(source){try{source.stop()}catch(e){}}
  source=audioCtx.createBufferSource();
  source.buffer=audioBuffer;source.connect(analyser);
  source.start(0);
  source.onended=()=>{
    isPlaying=false;
    document.getElementById('btnPlay').textContent='▶ Play';
    if(mode==='puzzle'){
      puzzleRunning=false;
      while(puzzleRevealed<puzzlePieces.length){
        puzzlePieces[puzzleRevealed].revealed=true;
        puzzlePieces[puzzleRevealed].animProgress=0;
        puzzleRevealed++;
      }
    }
  };
  isPlaying=true;
  document.getElementById('btnPlay').textContent='❚❚ Pausa';
  if(mode==='puzzle'){puzzleStartTime=audioCtx.currentTime;puzzleRunning=true;if(!puzzlePieces.length)buildPuzzle();}
}

function stopAudio(){
  if(source){try{source.stop()}catch(e){} source=null;}
  isPlaying=false;puzzleRunning=false;
  document.getElementById('btnPlay').textContent='▶ Play';
}

function getBands(){
  if(!analyser)return[0,0,0,0];
  const data=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const binHz=audioCtx.sampleRate/analyser.fftSize;
  return[[20,250],[250,800],[800,4000],[4000,20000]].map(([lo,hi])=>{
    const s=Math.floor(lo/binHz),e=Math.min(Math.ceil(hi/binHz),data.length);
    let sum=0;for(let i=s;i<e;i++)sum+=data[i];
    return sum/((e-s)*255);
  });
}

function getWaveform(){
  if(!analyser)return new Float32Array(256).fill(0);
  const data=new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(data);
  return data;
}

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=canvas.offsetWidth*window.devicePixelRatio;
  canvas.height=canvas.offsetHeight*window.devicePixelRatio;
  if(mode==='puzzle'&&puzzleImage)buildPuzzle();
}
window.addEventListener('resize',resize);resize();

function lfo(){
  const hz=mode==='covers'?lfoCovers:mode==='ink'?lfoInk:lfoShapes;
  return hz>0?Math.sin(lfoPhase*hz*Math.PI*2)*0.5+0.5:0;
}

function draw(){
  requestAnimationFrame(draw);
  t+=0.016;lfoPhase+=0.016;
  const W=canvas.width,H=canvas.height;
  const bands=getBands();
  if(mode==='covers')drawCovers(W,H,bands);
  else if(mode==='ink')drawInk(W,H,bands);
  else if(mode==='shapes')drawShapes(W,H,bands);
  else drawPuzzle(W,H,bands);
}
draw();

// ── COVERS ────────────────────────────────────────────────────────────────────
function drawCovers(W,H,bands){
  const lfoVal=lfo();
  ctx.fillStyle=`rgba(6,6,8,${pBlur+lfoVal*0.05})`;
  ctx.fillRect(0,0,W,H);
  const hasAny=images.some(Boolean);
  if(!hasAny){drawIdleBars(W,H,bands);return;}
  const order=[0,1,2,3].filter(i=>images[i]);
  order.sort((a,b)=>imgData[a].scale-imgData[b].scale);
  order.forEach(i=>{
    const img=images[i];if(!img)return;
    const band=bands[i]||0,d=imgData[i],m=pMotion*(1+lfoVal*0.5);
    switch(d.behavior){
      case 0:
        d.orbitAngle+=(d.orbitSpeed+band*0.04)*m;
        const r=Math.min(W,H)*0.22*m;
        d.x=W/2+Math.cos(d.orbitAngle)*r;d.y=H/2+Math.sin(d.orbitAngle)*r*0.55;
        d.angle+=(0.005+band*0.06)*m;break;
      case 1:
        d.x=W/2+Math.sin(t*0.25+d.phase)*W*0.28*m;d.y=H/2+Math.cos(t*0.18+d.phase)*H*0.22*m;
        d.angle+=(0.003+band*0.05)*m*-1;break;
      case 2:
        d.x=W/2+Math.cos(t*0.2+d.phase)*W*0.18*m;d.y=H/2+Math.sin(t*0.3+d.phase)*H*0.28*m;
        d.angle+=0.002*m;break;
      case 3:
        d.x=W/2+Math.sin(t*0.4+d.phase)*W*0.32*m;d.y=H*0.45+Math.cos(t*0.4+d.phase)*H*0.12*m;
        d.angle=Math.sin(t*0.4+d.phase)*0.3*m;break;
    }
    const baseSize=pScale*Math.min(W,H)*(0.55+i*0.08);
    d.scale=baseSize+band*0.15*Math.min(W,H)*m;
    ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.angle);
    if(d.behavior===0)ctx.scale(1,0.7+Math.sin(d.orbitAngle)*0.3);
    if(pGlow>0&&band>0.04){ctx.shadowColor=BAND_COLORS[i];ctx.shadowBlur=band*50*pGlow;}
    ctx.globalAlpha=0.35+band*0.65;
    ctx.drawImage(img,-d.scale/2,-d.scale/2,d.scale,d.scale);
    ctx.restore();
  });
  const avg=bands.reduce((a,b)=>a+b,0)/4;
  if(avg>0.02){
    ctx.beginPath();ctx.arc(W/2,H/2,Math.min(W,H)*(0.28+avg*0.12),0,Math.PI*2);
    ctx.strokeStyle=`rgba(232,213,163,${avg*0.1})`;ctx.lineWidth=1;ctx.stroke();
  }
}

function drawIdleBars(W,H,bands){
  const bw=W/4;
  bands.forEach((b,i)=>{ctx.fillStyle=BAND_COLORS[i]+'2a';ctx.fillRect(i*bw+2,H-b*H*0.5,bw-4,b*H*0.5);});
  ctx.fillStyle='rgba(232,213,163,.08)';ctx.font=`${10*devicePixelRatio}px DM Mono`;ctx.textAlign='center';
  ctx.fillText('Carregue imagens para visualizar',W/2,H/2);
}

// ── INK ───────────────────────────────────────────────────────────────────────
function drawInk(W,H,bands){
  const lfoVal=lfo();
  ctx.fillStyle=`rgba(4,4,6,${pInkBlur+lfoVal*0.01})`;
  ctx.fillRect(0,0,W,H);
  const avg=bands.reduce((a,b)=>a+b,0)/4;
  const bass=bands[0]||0,mid=bands[2]||0,high=bands[3]||0;
  if(avg>0.02){
    const count=Math.floor(avg*pInkDensity*pInkMotion*(1+lfoVal))+1;
    for(let n=0;n<count;n++){
      const colorIdx=Math.floor(Math.random()*INK_COLORS_AMB.length);
      const x=Math.random()*W,y=Math.random()*H;
      const angle=Math.random()*Math.PI*2;
      const speed=(0.3+Math.random()*1.4)*(1+bass*1.5)*pInkMotion;
      inkParticles.push({x,y,prevX:x,prevY:y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
        r:(0.6+Math.random()*2.2*(avg+bass))*pInkMotion,color:INK_COLORS_AMB[colorIdx],
        alpha:0.12+Math.random()*0.2,life:1,decay:0.006+Math.random()*0.01+high*0.015,
        spread:1+mid*1.4,curl:(Math.random()-0.5)*0.05});
    }
  }
  ctx.globalCompositeOperation='lighter';
  inkParticles=inkParticles.filter(p=>{
    p.life-=p.decay;if(p.life<=0)return false;
    p.prevX=p.x;p.prevY=p.y;
    const ang=Math.atan2(p.vy,p.vx)+p.curl;
    const sp=Math.hypot(p.vx,p.vy)*0.99;
    p.vx=Math.cos(ang)*sp;p.vy=Math.sin(ang)*sp;
    p.x+=p.vx*p.spread;p.y+=p.vy*p.spread;
    const[r,g,b]=p.color;
    ctx.strokeStyle=`rgba(${r},${g},${b},${p.alpha*p.life})`;
    ctx.lineWidth=Math.max(0.4,p.r*p.life);ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(p.prevX,p.prevY);ctx.lineTo(p.x,p.y);ctx.stroke();
    return true;
  });
  ctx.globalCompositeOperation='source-over';
  if(inkParticles.length>500)inkParticles.splice(0,inkParticles.length-500);
  // Draw strokes
  drawStrokes=drawStrokes.filter(s=>{
    s.life-=s.decay;if(s.life<=0)return false;
    const[r,g,b]=s.color;
    ctx.strokeStyle=`rgba(${r},${g},${b},${Math.min(1,s.life*1.2)})`;
    ctx.lineWidth=s.width;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();
    return true;
  });
  if(drawStrokes.length>3000)drawStrokes.splice(0,drawStrokes.length-3000);
}

// ── SHAPES ────────────────────────────────────────────────────────────────────
function rnd(n){return(Math.random()-0.5)*n;}

function roughLine(x1,y1,x2,y2,rough){
  if(rough<0.05){ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);return;}
  const mx=(x1+x2)/2+rnd(rough*Math.hypot(x2-x1,y2-y1));
  const my=(y1+y2)/2+rnd(rough*Math.hypot(x2-x1,y2-y1));
  ctx.moveTo(x1,y1);ctx.quadraticCurveTo(mx,my,x2,y2);
}

function shapeColor(palette,idx,alpha){
  const c=palette[idx%palette.length];
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  return`rgba(${r},${g},${b},${alpha})`;
}

function drawShapes(W,H,bands){
  const lfoVal=lfo();
  ctx.fillStyle=`rgba(6,6,8,${pShpBlur})`;
  ctx.fillRect(0,0,W,H);
  const avg=bands.reduce((a,b)=>a+b,0)/4;
  const bass=bands[0]||0,mid=bands[1]||0,high=bands[3]||0;
  const pal=SHAPE_PALETTES[shapeType];
  const intensity=pShpInt*(1+lfoVal*0.8);
  const rough=pShpRough;
  shapeAngle+=(0.008+bass*0.04+lfoVal*0.02)*intensity;

  switch(shapeType){
    case 'wave': drawWave(W,H,bands,pal,intensity,rough,lfoVal); break;
    case 'spiral': drawSpiral(W,H,bands,pal,intensity,rough,lfoVal); break;
    case 'lightning': drawLightning(W,H,bands,pal,intensity,rough); break;
    case 'mandala': drawMandala(W,H,bands,pal,intensity,rough,lfoVal); break;
    case 'tribal': drawTribal(W,H,bands,pal,intensity,rough,lfoVal); break;
  }
}

function drawWave(W,H,bands,pal,intensity,rough,lfoVal){
  const wf=getWaveform();
  const bass=bands[0],mid=bands[2],high=bands[3];
  const layers=3;
  for(let l=0;l<layers;l++){
    const yBase=H*(0.3+l*0.2);
    const amp=(H*0.15+bass*H*0.2+lfoVal*H*0.08)*intensity;
    const freq=1+l+mid*2;
    const alpha=0.5-l*0.1;
    ctx.beginPath();
    ctx.strokeStyle=shapeColor(pal,l,alpha);
    ctx.lineWidth=(2+bass*4+lfoVal*2)*intensity;
    ctx.lineCap='round';
    const step=Math.max(4,Math.floor(W/120));
    let first=true;
    for(let x=0;x<=W;x+=step){
      const idx=Math.floor((x/W)*wf.length);
      const wfVal=wf[idx]||0;
      const noise=rnd(rough*amp*0.3);
      const y=yBase+wfVal*amp*Math.sin(x*0.01*freq+t*(0.5+l*0.3)+shapeAngle)+noise;
      if(first){ctx.moveTo(x,y);first=false;}else{ctx.lineTo(x,y);}
    }
    ctx.stroke();
  }
  // Vertical spikes on high freq hits
  if(high>0.3){
    for(let i=0;i<Math.floor(high*8*intensity);i++){
      const x=Math.random()*W;
      const len=high*H*0.3*intensity;
      ctx.beginPath();
      ctx.strokeStyle=shapeColor(pal,0,high*0.6);
      ctx.lineWidth=1+high*2;
      roughLine(x,H/2,x+rnd(20),H/2-len*(0.5+Math.random()*0.5),rough);
      ctx.stroke();
    }
  }
}

function drawSpiral(W,H,bands,pal,intensity,rough,lfoVal){
  const bass=bands[0],mid=bands[1],high=bands[3];
  const arms=3+Math.floor(mid*3);
  const maxR=Math.min(W,H)*0.44*(0.7+lfoVal*0.3);
  for(let a=0;a<arms;a++){
    ctx.beginPath();
    ctx.strokeStyle=shapeColor(pal,a,0.6+bass*0.3);
    ctx.lineWidth=(1.5+bass*3)*intensity;
    ctx.lineCap='round';
    const baseAngle=(a/arms)*Math.PI*2+shapeAngle;
    let prevX=W/2,prevY=H/2,first=true;
    for(let r=0;r<maxR;r+=3){
      const angle=baseAngle+r*0.05*(1+mid*0.5)+lfoVal*0.5;
      const rx=W/2+Math.cos(angle)*r+rnd(rough*r*0.15);
      const ry=H/2+Math.sin(angle)*r*(0.8+bass*0.2)+rnd(rough*r*0.1);
      if(first){ctx.moveTo(rx,ry);first=false;}else{ctx.lineTo(rx,ry);}
      prevX=rx;prevY=ry;
    }
    ctx.stroke();
  }
  // Center burst on bass hits
  if(bass>0.4){
    for(let i=0;i<8;i++){
      const angle=(i/8)*Math.PI*2+shapeAngle;
      const len=bass*Math.min(W,H)*0.12*intensity;
      ctx.beginPath();
      ctx.strokeStyle=shapeColor(pal,0,bass*0.8);
      ctx.lineWidth=2*intensity;
      roughLine(W/2,H/2,W/2+Math.cos(angle)*len,H/2+Math.sin(angle)*len,rough);
      ctx.stroke();
    }
  }
}

function drawLightning(W,H,bands,pal,intensity,rough){
  const bass=bands[0],mid=bands[1],high=bands[3];
  const avg=bands.reduce((a,b)=>a+b,0)/4;
  if(avg<0.05)return;
  const strikes=1+Math.floor(bass*3*intensity);
  for(let s=0;s<strikes;s++){
    const x=W*0.2+Math.random()*W*0.6;
    const alpha=0.4+avg*0.5;
    ctx.strokeStyle=shapeColor(pal,s%pal.length,alpha);
    ctx.lineWidth=(1+high*3)*intensity;
    ctx.lineCap='round';
    bolt(x,0,x+rnd(W*0.15),H,8+Math.floor(high*6),rough,pal,s,intensity*avg);
  }
  // Glow on center
  if(bass>0.5){
    ctx.beginPath();
    ctx.arc(W/2,H/2,bass*Math.min(W,H)*0.05*intensity,0,Math.PI*2);
    ctx.fillStyle=shapeColor(pal,0,bass*0.3);
    ctx.fill();
  }
}

function bolt(x1,y1,x2,y2,depth,rough,pal,pidx,alpha){
  if(depth<=0||alpha<0.05)return;
  const mx=(x1+x2)/2+rnd(rough*Math.abs(y2-y1)*0.35);
  const my=(y1+y2)/2+rnd(rough*Math.abs(y2-y1)*0.1);
  ctx.beginPath();
  ctx.strokeStyle=shapeColor(pal,pidx,alpha);
  ctx.lineWidth=Math.max(0.5,depth*0.4);
  ctx.moveTo(x1,y1);ctx.lineTo(mx,my);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(x2,y2);ctx.stroke();
  if(depth>2&&Math.random()<0.45){
    const bx=mx+rnd(Math.abs(y2-y1)*0.4);
    const by=my+Math.abs(y2-y1)*0.3;
    bolt(mx,my,bx,by,depth-2,rough,pal,pidx,alpha*0.6);
  }
  bolt(x1,y1,mx,my,depth-1,rough,pal,pidx,alpha*0.75);
  bolt(mx,my,x2,y2,depth-1,rough,pal,pidx,alpha*0.75);
}

function drawMandala(W,H,bands,pal,intensity,rough,lfoVal){
  const bass=bands[0],mid=bands[1],high=bands[3];
  const cx=W/2,cy=H/2;
  const petals=6+Math.floor(mid*4);
  const maxR=Math.min(W,H)*(0.35+lfoVal*0.1)*intensity;
  // Outer petals
  for(let p=0;p<petals;p++){
    const baseA=(p/petals)*Math.PI*2+shapeAngle;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(baseA);
    // Petal shape — rough ellipse
    ctx.beginPath();
    ctx.strokeStyle=shapeColor(pal,p%pal.length,0.4+bass*0.4);
    ctx.lineWidth=(1+bass*2)*intensity;
    const pr=maxR*(0.4+bass*0.3),pw=maxR*0.15;
    for(let i=0;i<=20;i++){
      const ang=(i/20)*Math.PI*2;
      const rx=Math.cos(ang)*pw+rnd(rough*pw*0.4);
      const ry=Math.sin(ang)*pr+rnd(rough*pr*0.15)-pr*0.5;
      i===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
    }
    ctx.closePath();ctx.stroke();
    // Spoke
    ctx.beginPath();
    ctx.strokeStyle=shapeColor(pal,0,0.3+mid*0.4);
    ctx.lineWidth=1*intensity;
    roughLine(0,0,rnd(rough*10),-(pr*0.9+rnd(rough*pr*0.2)),rough*0.5);
    ctx.stroke();
    ctx.restore();
  }
  // Inner rings
  [0.12,0.22,0.32].forEach((rf,ri)=>{
    const r=maxR*rf*(1+high*0.3+lfoVal*0.1);
    ctx.beginPath();
    ctx.strokeStyle=shapeColor(pal,ri%pal.length,0.3+bass*0.3);
    ctx.lineWidth=(1+ri)*intensity;
    for(let i=0;i<=32;i++){
      const ang=(i/32)*Math.PI*2+shapeAngle*(ri+1);
      const rx=cx+Math.cos(ang)*r+rnd(rough*r*0.05);
      const ry=cy+Math.sin(ang)*r+rnd(rough*r*0.05);
      i===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
    }
    ctx.closePath();ctx.stroke();
  });
  // Center dot
  ctx.beginPath();
  ctx.arc(cx,cy,Math.max(2,(bass+high)*8*intensity),0,Math.PI*2);
  ctx.fillStyle=shapeColor(pal,0,0.6+bass*0.4);ctx.fill();
}

function drawTribal(W,H,bands,pal,intensity,rough,lfoVal){
  const bass=bands[0],mid=bands[1],high=bands[3];
  const avg=bands.reduce((a,b)=>a+b,0)/4;
  const cx=W/2,cy=H/2;
  // Horizontal bar pattern
  const bars=4+Math.floor(mid*4);
  for(let b=0;b<bars;b++){
    const y=H*0.15+b*(H*0.7/bars)+lfoVal*20;
    const segments=3+Math.floor(avg*5);
    const segW=W*0.7/segments;
    const xStart=cx-W*0.35;
    for(let s=0;s<segments;s++){
      if(Math.random()<0.3)continue;
      const x=xStart+s*segW;
      const h2=(12+bass*30+lfoVal*10)*intensity;
      ctx.beginPath();
      ctx.strokeStyle=shapeColor(pal,s%pal.length,0.4+avg*0.5);
      ctx.lineWidth=(2+bass*3)*intensity;
      ctx.lineCap='square';
      roughLine(x+rnd(rough*10),y-h2*0.5,x+segW*0.8+rnd(rough*10),y+h2*0.5,rough);
      ctx.stroke();
    }
  }
  // Vertical totems
  const totems=2+Math.floor(bass*3);
  for(let tv=0;tv<totems;tv++){
    const x=W*0.15+tv*(W*0.7/(totems+1))+rnd(rough*20);
    const segH=H*0.55/4;
    for(let ts=0;ts<4;ts++){
      const y=H*0.22+ts*segH;
      const w2=(10+mid*20)*intensity;
      ctx.beginPath();
      ctx.strokeStyle=shapeColor(pal,tv%pal.length,0.3+bass*0.5);
      ctx.lineWidth=(1.5+high*2)*intensity;
      // Diamond / zigzag motif
      ctx.moveTo(x,y+rnd(rough*8));
      ctx.lineTo(x+w2,y+segH*0.5+rnd(rough*8));
      ctx.lineTo(x,y+segH+rnd(rough*8));
      ctx.lineTo(x-w2,y+segH*0.5+rnd(rough*8));
      ctx.closePath();ctx.stroke();
    }
  }
  // Dots
  if(high>0.2){
    for(let d=0;d<Math.floor(high*15*intensity);d++){
      ctx.beginPath();
      ctx.arc(cx+rnd(W*0.45),cy+rnd(H*0.45),1+high*3*intensity,0,Math.PI*2);
      ctx.fillStyle=shapeColor(pal,d%pal.length,high*0.7);ctx.fill();
    }
  }
}

// ── PUZZLE ────────────────────────────────────────────────────────────────────
function buildPuzzle(){
  if(!puzzleImage)return;
  const W=canvas.width,H=canvas.height;
  const ir=puzzleImage.width/puzzleImage.height,cr=W/H;
  let dW,dH,dX,dY;
  if(ir>cr){dW=W;dH=W/ir;dX=0;dY=(H-dH)/2;}
  else{dH=H;dW=H*ir;dX=(W-dW)/2;dY=0;}
  const total=puzzlePieceCount;
  puzzleRows=Math.round(Math.sqrt(total/ir));
  puzzleCols=Math.round(total/puzzleRows);
  const pw=dW/puzzleCols,ph=dH/puzzleRows;
  puzzleCanvas.width=dW;puzzleCanvas.height=dH;
  const pc=puzzleCanvas.getContext('2d');
  pc.drawImage(puzzleImage,0,0,dW,dH);
  puzzlePieces=[];
  for(let row=0;row<puzzleRows;row++){
    for(let col=0;col<puzzleCols;col++){
      const edge=Math.floor(Math.random()*4);
      const p={col,row,srcX:col*pw,srcY:row*ph,destX:dX+col*pw,destY:dY+row*ph,w:pw,h:ph,
        edge,revealed:false,animProgress:0,initRot:(Math.random()-.5)*0.4,startX:0,startY:0};
      switch(edge){
        case 0:p.startX=p.destX;p.startY=-ph*2;break;
        case 1:p.startX=W+pw*2;p.startY=p.destY;break;
        case 2:p.startX=p.destX;p.startY=H+ph*2;break;
        case 3:p.startX=-pw*2;p.startY=p.destY;break;
      }
      puzzlePieces.push(p);
    }
  }
  for(let i=puzzlePieces.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[puzzlePieces[i],puzzlePieces[j]]=[puzzlePieces[j],puzzlePieces[i]];}
  puzzleRevealed=0;puzzleCompletionFade=0;
  puzzleInterval=audioBuffer?(audioBuffer.duration*0.96)/puzzlePieces.length:2;
  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);
}

function resetPuzzle(){
  puzzleRunning=false;puzzleCompletionFade=0;
  buildPuzzle();
  ctx.fillStyle='#060608';ctx.fillRect(0,0,canvas.width,canvas.height);
  document.getElementById('pProgress').textContent='';
}

function drawPuzzle(W,H,bands){
  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);
  if(puzzleRunning&&audioCtx&&puzzlePieces.length){
    const elapsed=audioCtx.currentTime-puzzleStartTime;
    while(puzzleRevealed<puzzlePieces.length&&elapsed>=(puzzleRevealed+1)*puzzleInterval){
      puzzlePieces[puzzleRevealed].revealed=true;puzzlePieces[puzzleRevealed].animProgress=0;puzzleRevealed++;
    }
    document.getElementById('pProgress').textContent=`${puzzleRevealed}/${puzzlePieces.length}`;
  }
  puzzlePieces.forEach(p=>{
    if(!p.revealed)return;
    if(p.animProgress<1)p.animProgress=Math.min(1,p.animProgress+0.06);
    const ease=1-Math.pow(1-p.animProgress,3);
    const cx=p.startX+(p.destX-p.startX)*ease,cy=p.startY+(p.destY-p.startY)*ease;
    const rot=p.initRot*(1-ease);
    ctx.save();ctx.translate(cx+p.w/2,cy+p.h/2);ctx.rotate(rot);
    ctx.globalAlpha=0.3+ease*0.7;
    ctx.drawImage(puzzleCanvas,p.srcX,p.srcY,p.w,p.h,-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
  });
  // Completion fade
  if(puzzlePieces.length>0&&puzzleRevealed===puzzlePieces.length){
    const allDone=puzzlePieces.every(p=>p.animProgress>=1);
    if(allDone&&puzzleCompletionFade<1){
      puzzleCompletionFade=Math.min(1,puzzleCompletionFade+0.02);
      const ir=puzzleImage.width/puzzleImage.height,cr=W/H;
      let dW,dH,dX,dY;
      if(ir>cr){dW=W;dH=W/ir;dX=0;dY=(H-dH)/2;}
      else{dH=H;dW=H*ir;dX=(W-dW)/2;dY=0;}
      const ease=1-Math.pow(1-puzzleCompletionFade,2);
      ctx.globalAlpha=ease;
      ctx.drawImage(puzzleCanvas,0,0,puzzleCanvas.width,puzzleCanvas.height,dX,dY,dW,dH);
      ctx.globalAlpha=1;
      if(puzzleCompletionFade>=1)setStatus('Completo!');
    }
  }
  // Idle
  if(!puzzleRunning&&puzzleRevealed===0){
    ctx.fillStyle='rgba(232,213,163,.07)';ctx.font=`${10*devicePixelRatio}px DM Mono`;ctx.textAlign='center';
    if(!puzzleImage)ctx.fillText('Carregue imagem e áudio, depois Play',W/2,H/2);
    else if(!audioBuffer)ctx.fillText('Carregue áudio e pressione Play',W/2,H/2);
    else ctx.fillText('Pressione Play para revelar o puzzle',W/2,H/2);
  }
}

// ── Pointer (Ink draw mode) ───────────────────────────────────────────────────
function getCP(e){
  const r=canvas.getBoundingClientRect();
  return{x:(e.clientX-r.left)*devicePixelRatio,y:(e.clientY-r.top)*devicePixelRatio};
}
canvas.addEventListener('pointerdown',e=>{
  if(mode!=='ink')return;
  isPointerDown=true;const p=getCP(e);
  if(drawMode)lastDrawPos=p;else spawnInkDrop(p.x,p.y,0.5);
});
canvas.addEventListener('pointermove',e=>{
  if(mode!=='ink'||!isPointerDown)return;
  const p=getCP(e);
  if(drawMode&&lastDrawPos){
    drawStrokes.push({x1:lastDrawPos.x,y1:lastDrawPos.y,x2:p.x,y2:p.y,
      color:drawColor,width:drawWidth*devicePixelRatio,life:1,decay:1/(drawDuration*60)});
    lastDrawPos=p;
  }else if(!drawMode){spawnInkDrop(p.x,p.y,0.3);}
});
window.addEventListener('pointerup',()=>{isPointerDown=false;lastDrawPos=null;});

function spawnInkDrop(x,y,intensity){
  const ci=Math.floor(Math.random()*INK_COLORS_AMB.length);
  for(let i=0;i<10;i++){
    const angle=Math.random()*Math.PI*2,speed=(0.5+Math.random()*1.8)*intensity*pInkMotion;
    const[r,g,b]=INK_COLORS_AMB[ci];
    inkParticles.push({x,y,prevX:x,prevY:y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      r:(0.8+Math.random()*1.8)*intensity*pInkMotion,color:[r,g,b],alpha:0.15+Math.random()*0.2,
      life:1,decay:0.005+Math.random()*0.008,spread:1.2,curl:(Math.random()-0.5)*0.07});
  }
}

function toggleDraw(){
  drawMode=!drawMode;
  document.getElementById('btnDraw').classList.toggle('active',drawMode);
}

// ── Mode / Shape switch ───────────────────────────────────────────────────────
function setMode(m){
  mode=m;
  ['Covers','Ink','Shapes','Puzzle'].forEach(n=>{
    document.getElementById(`btnMode${n}`).classList.toggle('active',m===n.toLowerCase());
    document.getElementById(`ctrl${n}`).classList.toggle('visible',m===n.toLowerCase());
  });
  ctx.fillStyle='#060608';ctx.fillRect(0,0,canvas.width,canvas.height);
  inkParticles=[];
  if(m==='puzzle'&&puzzleImage)buildPuzzle();
}

function setShape(s){
  shapeType=s;
  ['wave','spiral','lightning','mandala','tribal'].forEach(n=>{
    document.getElementById(`shp${n.charAt(0).toUpperCase()+n.slice(1)}`).classList.toggle('active',s===n);
  });
  ctx.fillStyle='#060608';ctx.fillRect(0,0,canvas.width,canvas.height);
}

// ── Recording ─────────────────────────────────────────────────────────────────
function toggleRecord(){if(isRecording)stopRecord();else startRecord();}
function startRecord(){
  recordedChunks=[];recordedBlob=null;document.getElementById('btnDown').style.display='none';
  const stream=canvas.captureStream(30);
  if(audioCtx&&analyser){try{const dest=audioCtx.createMediaStreamDestination();analyser.connect(dest);dest.stream.getAudioTracks().forEach(t=>stream.addTrack(t));}catch(e){}}
  const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':MediaRecorder.isTypeSupported('video/webm')?'video/webm':'video/mp4';
  try{
    mediaRecorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:5000000});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data);};
    mediaRecorder.onstop=()=>{recordedBlob=new Blob(recordedChunks,{type:mime});document.getElementById('btnDown').style.display='block';setStatus(`Pronto · ${(recordedBlob.size/1024/1024).toFixed(1)}MB`);};
    mediaRecorder.start(100);isRecording=true;
    document.getElementById('btnRec').className='btn recording';
    document.getElementById('btnRec').textContent='⏹ Parar';
    setStatus('Gravando...');
    if(!isPlaying&&audioBuffer)playAudio();
  }catch(e){setStatus('Gravação não suportada. Use Chrome desktop.');}
}
function stopRecord(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
  isRecording=false;document.getElementById('btnRec').className='btn rec';document.getElementById('btnRec').textContent='⏺ Rec';
}
function downloadVideo(){
  if(!recordedBlob)return;
  const url=URL.createObjectURL(recordedBlob);
  const a=document.createElement('a');a.href=url;a.download=`psicoscopio-${Date.now()}.webm`;a.click();URL.revokeObjectURL(url);
}

// ── Sliders ───────────────────────────────────────────────────────────────────
const lfoFmt=v=>v<0.01?'off':v.toFixed(2);
[['slBlur','vBlur',2,'',v=>pBlur=v],
 ['slMotion','vMotion',1,'',v=>pMotion=v],
 ['slGlow','vGlow',2,'',v=>pGlow=v],
 ['slScale','vScale',2,'',v=>pScale=v],
 ['slCovLFO','vCovLFO',0,'',v=>{lfoCovers=v;document.getElementById('vCovLFO').textContent=lfoFmt(v);}],
 ['slInkBlur','vInkBlur',3,'',v=>pInkBlur=v],
 ['slInkMotion','vInkMotion',1,'',v=>pInkMotion=v],
 ['slInkDensity','vInkDensity',0,'',v=>pInkDensity=v],
 ['slInkLFO','vInkLFO',0,'',v=>{lfoInk=v;document.getElementById('vInkLFO').textContent=lfoFmt(v);}],
 ['slDW','vDW',0,'px',v=>drawWidth=v],
 ['slDD','vDD',1,'s',v=>drawDuration=v],
 ['slShpBlur','vShpBlur',3,'',v=>pShpBlur=v],
 ['slShpInt','vShpInt',1,'',v=>pShpInt=v],
 ['slShpRough','vShpRough',2,'',v=>pShpRough=v],
 ['slShpLFO','vShpLFO',0,'',v=>{lfoShapes=v;document.getElementById('vShpLFO').textContent=lfoFmt(v);}],
 ['slPieces','vPieces',0,'',v=>{puzzlePieceCount=v;if(mode==='puzzle')resetPuzzle();}],
].forEach(([id,vid,dec,sfx,fn])=>{
  const el=document.getElementById(id);if(!el)return;
  el.addEventListener('input',function(){
    const v=parseFloat(this.value);fn(v);
    if(vid&&!['vCovLFO','vInkLFO','vShpLFO'].includes(vid))
      document.getElementById(vid).textContent=v.toFixed(dec)+sfx;
  });
});

function setStatus(msg){document.getElementById('status').textContent=msg;}
</script>
